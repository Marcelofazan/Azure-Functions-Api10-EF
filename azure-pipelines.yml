trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. Instala as ferramentas do Azure Functions Core Tools
- task: FuncToolsInstaller@0
  displayName: 'Instalar Azure Functions Core Tools'
  inputs:
    version: 'latest'

# 2. Restaura os pacotes NuGet do projeto
- task: DotNetCoreCLI@2
  displayName: 'Recuperar os pacotes'
  inputs:
    command: 'restore'
    projects: '**/ApiFunctionsAzure.csproj'

# 3. Compila o projeto ignorando avisos estritos de variáveis nulas
- task: DotNetCoreCLI@2
  displayName: 'Buildando o projeto'
  inputs:
    command: 'build'
    projects: '**/ApiFunctionsAzure.csproj'
    arguments: '--configuration Release /p:NoWarn=CS8602,CS8618,CS8634'

# 4. Faz uma simulação completa de compilação de produção (Garante que o EF e as rotas estão corretas)
- script: |
    echo "Navegando para o diretório do projeto..."
    cd ./ApiFunctionsAzure
    
    echo "Executando validação de publicação do Azure Functions..."
    dotnet publish --configuration Release /p:NoWarn=CS8602,CS8618,CS8634 --output ./publish_output
  displayName: 'Validar Integridade dos Endpoints'
