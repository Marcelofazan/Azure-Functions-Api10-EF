trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. Instala as ferramentas do Azure Functions Core Tools
- task: FuncToolsInstaller@0
  displayName: 'Instalar Azure Functions Core Tools'
  inputs:
    version: 'latest'

# 2. Restaura os pacotes NuGet do projeto
- task: DotNetCoreCLI@2
  displayName: 'Recuperar os pacotes'
  inputs:
    command: 'restore'
    projects: '**/ApiFunctionsAzure.csproj'

# 3. Compila o projeto com aspas extras protegendo os argumentos
- script: |
    dotnet build ./ApiFunctionsAzure/ApiFunctionsAzure.csproj --configuration Release "/p:NoWarn=\"CS8602;CS8618;CS8634\""
  displayName: 'Buildando o projeto'

# 4. Publica com aspas extras protegendo os argumentos
- script: |
    dotnet publish ./ApiFunctionsAzure/ApiFunctionsAzure.csproj --configuration Release "/p:NoWarn=\"CS8602;CS8618;CS8634\"" --output ./publish_output
  displayName: 'Validar Integridade dos Endpoints'
